<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My To-Do List</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background-color: #ef4444;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background-color: aquamarine;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1a1a2e;
    }

    .counter {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #1114d2;
    }

    .btn-add {
      padding: 10px 18px;
      background:rgb(227, 7, 117);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background: #a5b4fc;
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filter-bar button {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #d1d5db;
      background: transparent;
      font-size: 13px;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.15s;
    }

    .filter-bar button.active {
      background: #ede9fe;
      border-color: #a5b4fc;
      color: #4f46e5;
      font-weight: 600;
    }

    .filter-bar .btn-clear {
      margin-left: auto;
    }

    #taskList {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      transition: opacity 0.15s;
    }

    .task-item.done {
      opacity: 0.55;
    }

    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid #d1d5db;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      font-size: 13px;
      color: #fff;
    }

    .check-btn.checked {
      background: #22c55e;
      border-color: #22c55e;
    }

    .task-label {
      flex: 1;
      font-size: 15px;
      color: #1a1a2e;
    }

    .task-item.done .task-label {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .del-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #d1d5db;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s;
    }

    .del-btn:hover {
      color: #ef4444;
    }

    .empty-msg {
      text-align: center;
      color:#6366f1
      font-size: 14px;
      margin-top: 1.5rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>📝 My To-Do List</h1>
    <p class="counter" id="counter">0 tasks remaining</p>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="80" />
      <button class="btn btn-add" onclick="addTask()">+ Add</button>
    </div>

    <div class="filter-bar">
      <button class="active" id="btn-all"   onclick="setFilter('all')">All</button>
      <button               id="btn-active" onclick="setFilter('active')">Active</button>
      <button               id="btn-done"   onclick="setFilter('done')">Done</button>
      <button class="btn-clear"             onclick="clearDone()">Clear done</button>
    </div>

    <div id="taskList"></div>
    <p class="empty-msg" id="emptyMsg">No tasks here yet.</p>
  </div>

  <script>
    let tasks = [
      { id: 1, text: "solve DSA questions",       done: false },
      { id: 2, text: "read 2 pages of book", done: false },
      { id: 3, text: "Practice communication",       done: true  }
    ];
    let filter = 'all';
    let nextId = 4;

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: nextId++, text, done: false });
      input.value = '';
      render();
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      render();
    }

    function setFilter(f) {
      filter = f;
      ['all', 'active', 'done'].forEach(k => {
        document.getElementById('btn-' + k).classList.toggle('active', k === f);
      });
      render();
    }

    function render() {
      const list    = document.getElementById('taskList');
      const empty   = document.getElementById('emptyMsg');
      const counter = document.getElementById('counter');

      const remaining = tasks.filter(t => !t.done).length;
      counter.textContent = remaining === 1
        ? '1 task remaining'
        : remaining + ' tasks remaining';

      const visible = tasks.filter(t =>
        filter === 'all'    ? true :
        filter === 'active' ? !t.done :
        t.done
      );

      empty.style.display = visible.length === 0 ? 'block' : 'none';

      list.innerHTML = '';
      visible.forEach(task => {
        const item = document.createElement('div');
        item.className = 'task-item' + (task.done ? ' done' : '');

        const check = document.createElement('button');
        check.className = 'check-btn' + (task.done ? ' checked' : '');
        check.innerHTML = task.done ? '✓' : '';
        check.onclick = () => toggleTask(task.id);

        const label = document.createElement('span');
        label.className = 'task-label';
        label.textContent = task.text;

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.innerHTML = '🗑';
        del.onclick = () => deleteTask(task.id);

        item.appendChild(check);
        item.appendChild(label);
        item.appendChild(del);
        list.appendChild(item);
      });
    }

    document.getElementById('taskInput')
    .addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>

</body>
</html>
